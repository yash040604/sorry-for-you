<!DOCTYPE html>
<html>
<head>
    <title>Sorry Sreeja ❤️</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: 'Courier New', monospace;
            padding-top: 100px;
        }
        .box {
            border: 2px solid white;
            padding: 30px;
            display: inline-block;
            border-radius: 15px;
            max-width: 500px;
        }
        #text {
            font-size: 18px;
            white-space: pre-line;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: red;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Dear Sreeja ❤️</h2>
    <p id="text"></p>
    <button onclick="finalMessage()">One last thing...</button>
</div>

<script>
const message = `I know I hurt you...
And I hate that I did.

You're not just someone in my life,
you're someone I never want to lose.

No ego, no excuses...
just me, accepting my mistake.

I'm really sorry, Sreeja.

— Yashwanth ❤️`;

let i = 0;
function typeEffect() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();

function finalMessage() {
    alert("I’ll prove my love through actions, not just words. Please give me one chance ❤️");
}
</script>

</body>
</html>
