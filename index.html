<!DOCTYPE html>
<html>
<head>
    <title>I'm Sorry ❤️</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
            padding-top: 100px;
        }
        .box {
            border: 2px solid white;
            padding: 25px;
            display: inline-block;
            border-radius: 15px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: red;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>if (love == true) ❤️</h2>
    <p>I know I messed up...</p>
    <p>I never meant to hurt you.</p>
    <p><b>I'm really sorry.</b></p>
    <p>You mean everything to me.</p>

    <button onclick="showMessage()">Click if you still love me ❤️</button>
</div>

<script>
function showMessage() {
    alert("I promise I'll be better. Please don't give up on us ❤️");
}
</script>

</body>
</html>
